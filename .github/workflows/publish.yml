name: publish

# Publishes aphelion to PyPI via a Trusted Publisher (OIDC) — no API token needed.
# Fires automatically when a GitHub Release is published, or on manual dispatch.
on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write   # REQUIRED for PyPI Trusted Publisher (OIDC); do not remove
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade build
          python -m build
      - name: Publish to PyPI (Trusted Publisher, tokenless)
        uses: pypa/gh-action-pypi-publish@release/v1
