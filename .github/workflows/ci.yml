name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: ${{ matrix.os }} / py${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # Windows + py3.11 listed first: per 2026-04-19 cp950 precedent it is
        # the most fragile cell, so surfacing failures there earliest saves
        # the later cells from wasted runtime.
        os: [windows-latest, ubuntu-latest, macos-latest]
        python-version: ["3.11", "3.10", "3.12"]

    env:
      PYTHONIOENCODING: utf-8
      PYTHONUTF8: "1"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests with coverage
        run: |
          pytest --cov=src --cov-report=term-missing --cov-fail-under=80

      - name: Smoke test init -> validate -> verify (bash)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          WORK="$RUNNER_TEMP/aphelion-smoke"
          rm -rf "$WORK"
          mkdir -p "$WORK"
          aphe --version
          aphe init "$WORK/pkg"
          aphe validate "$WORK/pkg"
          aphe pack "$WORK/pkg" "$WORK/out.aphelion.tar"
          aphe unpack "$WORK/out.aphelion.tar" "$WORK/unpacked"
          aphe verify "$WORK/unpacked"

      - name: Smoke test init -> validate -> verify (PowerShell)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $work = Join-Path $env:RUNNER_TEMP 'aphelion-smoke'
          if (Test-Path $work) { Remove-Item -Recurse -Force $work }
          New-Item -ItemType Directory -Path $work | Out-Null
          aphe --version
          aphe init "$work/pkg"
          aphe validate "$work/pkg"
          aphe pack "$work/pkg" "$work/out.aphelion.tar"
          aphe unpack "$work/out.aphelion.tar" "$work/unpacked"
          aphe verify "$work/unpacked"
